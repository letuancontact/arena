<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EvoWar Arena</title>
    <link rel="stylesheet" href="style.css" />
    
    <!-- CSS Giao diện Popup siêu gọn -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

      /* ĐÃ SỬA: Đổi tên lại thành ui-layer để không lỗi Input.js */
      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 9999;
      }

      .screen-container {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('img/mapbg.png');
        background-size: 150px 150px; 
        background-repeat: repeat;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        transition: opacity 0.3s ease;
      }

      .popup-panel {
        background: rgba(25, 28, 33, 0.9); 
        backdrop-filter: blur(5px);
        border-radius: 16px;
        width: 85%; max-width: 420px; /* ĐÃ SỬA: Thu nhỏ khung cực gọn */
        padding: 15px 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        border: 2px solid rgba(255,255,255,0.08);
        text-align: center;
        font-family: 'Nunito', sans-serif;
      }

      .panel-section {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px; padding: 12px; margin-bottom: 12px;
        border: 1px solid rgba(255,255,255,0.03);
      }

      .popup-panel h1 {
        font-family: 'Fredoka One', cursive; color: #ffffff;
        font-size: 24px; margin: 0 0 5px 0; text-shadow: 0 3px 5px rgba(0,0,0,0.6);
      }
      
      .popup-panel h2 { color: #aaaaaa; font-size: 14px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
      .popup-panel p { color: #d0d0d0; font-size: 13px; margin: 0; line-height: 1.4; }
      .desc-text { font-size: 12px !important; color: #888888 !important; margin-bottom: 10px !important; }

      .logo-section { margin: 5px 0; }
      .logo-section img { height: 85px; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.6)); }

      #player-name {
        width: 85%; max-width: 250px;
        padding: 10px 15px; margin-bottom: 12px;
        border-radius: 20px; border: 2px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.6); color: #fff; font-size: 16px;
        font-family: 'Nunito', sans-serif; font-weight: bold; text-align: center;
        outline: none; transition: all 0.2s;
      }
      #player-name:focus { border-color: #ffaa00; box-shadow: 0 0 10px rgba(255,170,0,0.3); }

      .action-btn {
        background: linear-gradient(to bottom, #ff6a00, #d62800);
        border: 2px solid #ffcc00; border-radius: 10px;
        padding: 10px 35px; color: white;
        font-family: 'Fredoka One', cursive; font-size: 22px;
        cursor: pointer; text-shadow: 0 2px 3px rgba(0,0,0,0.5);
        box-shadow: 0 5px 0 #8a1900, 0 8px 10px rgba(0,0,0,0.4);
        transition: transform 0.1s, box-shadow 0.1s; width: 85%; max-width: 250px;
      }
      .action-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #8a1900, 0 3px 5px rgba(0,0,0,0.4); }
      .action-btn:hover { filter: brightness(1.15); }
      .action-btn:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; box-shadow: none; border-color: #666; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <button id="mute-btn">🔊</button>

    <!-- LỚP BỌC UI -->
    <div id="ui-layer">
        <!-- MÀN HÌNH MENU -->
        <div id="lobby-screen" class="screen-container">
            <div class="popup-panel">
                <div class="panel-section">
                    <h1>Evo Arena</h1>
                    <h2>Fight! Kill! Evolve!</h2>
                    <p>Level up to evolve your character.<br>Bigger weapons, stronger armor!</p>
                </div>
                
                <div class="logo-section">
                    <img src="img/logo.png" alt="Logo">
                </div>

                <div class="panel-section" style="margin-bottom: 0;">
                    <p class="desc-text">Collect orbs and defeat opponents to grow larger.<br>Beware of faster, smaller assassins!</p>
                    
                    <input type="text" id="player-name" placeholder="Enter your name..." maxlength="15" autocomplete="off" spellcheck="false">
                    <br>
                    <button id="play-btn" class="action-btn">PLAY</button>
                    <div id="status-text" style="color: #ffaa00; margin-top: 8px; font-weight: bold; font-family: sans-serif; font-size: 12px;"></div>
                </div>
            </div>
        </div>

        <!-- MÀN HÌNH GAME OVER -->
        <div id="game-over-screen" class="screen-container" style="display: none; background: rgba(0,0,0,0.85); background-image: none;">
            <div class="popup-panel">
                <h1 style="color: #ff3333; font-size: 38px; text-transform: uppercase;">You Died!</h1>
                
                <div class="panel-section" style="text-align: left; max-width: 250px; margin: 0 auto 15px auto; font-size: 16px;">
                    <p style="margin-bottom: 8px">⭐ Cấp độ: <strong id="go-level" style="color: #00ffff; float: right;">1</strong></p>
                    <p style="margin-bottom: 8px">⚔️ Kẻ thù hạ gục: <strong id="go-kills" style="color: #ffcc00; float: right;">0</strong></p>
                    <p>✨ Kinh nghiệm: <strong id="go-xp" style="color: #00ff66; float: right;">0</strong></p>
                </div>

                <button id="respawn-btn" class="action-btn" style="background: linear-gradient(to bottom, #0099ff, #0055aa); border-color: #00ffff; box-shadow: 0 5px 0 #003366;">RESPAWN</button>
            </div>
        </div>
    </div>

    <script src="/shared/constants.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
