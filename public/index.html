<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EvoWar Arena</title>
    <!-- ĐÃ SỬA: Nạp CSS bằng file ngoài -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- Nút Âm Thanh được đưa ra HTML -->
    <button id="mute-btn">🔊</button>

    <!-- MÀN HÌNH CHỜ (MAIN MENU) -->
    <div id="ui-layer">
      <div class="menu-box">
        <h1 class="game-title">EVO<span>WARS</span></h1>
        <input type="text" id="name-input" placeholder="Nhập tên của bạn..." maxlength="15" autocomplete="off" spellcheck="false" />
        <button id="play-btn" disabled>ĐANG KẾT NỐI...</button>
        <div id="status-text"></div>
      </div>
    </div>

    <!-- Nạp CONFIG dùng chung trước -->
    <script src="/shared/constants.js"></script>
    <!-- Nạp Main Module -->
    <script type="module" src="main.js"></script>
  </body>
</html>
