<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evo Arena</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #0d1117; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif;
        }
        #game { display: block; width: 100vw; height: 100vh; }

        /* MÀN HÌNH LOBBY CHỜ */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000;
            background-color: #0d1117;
            /* Lưới nền Cyberpunk */
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            user-select: none;
        }

        /* Hộp thoại giới thiệu */
        .panel {
            background: rgba(20, 25, 30, 0.85); border: 2px solid rgba(0, 255, 255, 0.15);
            border-radius: 12px; padding: 25px 30px; text-align: center;
            max-width: 750px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        
        .panel h1 { color: #00ffff; font-size: 30px; margin: 0 0 10px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 15px rgba(0,255,255,0.4); }
        .panel h2 { color: #fff; font-size: 20px; margin: 0 0 15px 0; font-weight: 600; }
        .panel p { color: #bbb; font-size: 14px; line-height: 1.6; margin: 0; }

        /* Logo Vương Miện */
        .logo-box { text-align: center; margin: 5px 0; }
        #game-logo { height: 130px; filter: drop-shadow(0 10px 15px rgba(255,200,0,0.4)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* Khu vực điều khiển nhập tên */
        .action-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        #name-input {
            background: #161b22; border: 2px solid #30363d; color: #fff; padding: 15px 20px;
            border-radius: 8px; font-size: 18px; text-align: center; width: 260px; outline: none; font-weight: bold;
            transition: all 0.3s;
        }
        #name-input:focus { border-color: #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.3); background: #1c2128; }

        /* Nút PLAY Cam */
        #play-btn {
            background: linear-gradient(180deg, #ff8c00, #e63900); border: 2px solid #ffcc00;
            border-bottom-width: 6px; color: #fff; font-size: 32px; font-weight: 900;
            padding: 12px 60px; border-radius: 12px; cursor: pointer; text-shadow: 2px 2px 0px #802000;
            text-transform: uppercase; font-family: 'Impact', 'Arial Black', sans-serif; letter-spacing: 2px;
            transition: all 0.1s; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        #play-btn:hover:not(:disabled) { transform: translateY(-2px); border-bottom-width: 8px; filter: brightness(1.1); }
        #play-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }
        
        #play-btn:disabled { 
            background: linear-gradient(180deg, #444, #222); border-color: #555; color: #888;
            cursor: not-allowed; border-bottom-width: 3px; transform: none; text-shadow: none;
            font-size: 20px; padding: 15px 40px; font-family: monospace, sans-serif;
        }

        #status-text { color: #ff4444; font-weight: bold; margin-top: 5px; font-size: 16px; text-shadow: 1px 1px 2px #000; max-width: 80%; text-align: center;}

        /* Nút Tắt/Bật Âm Thanh */
        #mute-btn {
            position: fixed; top: 15px; right: 215px; background: rgba(20,25,30,0.8); color: #fff;
            border: 2px solid #445566; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 18px; z-index: 2001; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #mute-btn:hover { background: #334455; border-color: #00ffff; transform: scale(1.1); }

        @media (max-width: 768px) {
            .panel { padding: 15px 20px; }
            .panel h1 { font-size: 22px; }
            .panel h2 { font-size: 16px; }
            #game-logo { height: 100px; }
            #play-btn { font-size: 24px; padding: 10px 50px; }
            #mute-btn { right: 105px; width: 34px; height: 34px; font-size: 14px; top: 8px; border-width: 1px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <button id="mute-btn">🔊</button>

    <div id="ui-layer">
        <div class="panel">
            <h1>CHÀO MỪNG ĐẾN VỚI EVO ARENA</h1>
            <h2>Chiến đấu! Giết chóc! Tiến hóa!</h2>
            <p>Nhân vật của bạn sẽ tiến hóa mỗi khi bạn lên cấp. Vũ khí và trang phục cũng sẽ tự động nâng cấp theo. Hãy coi chừng những kẻ thù nhỏ bé, chúng là những sát thủ nhanh nhất!</p>
        </div>

        <div class="logo-box">
            <img src="img/king.png" alt="Logo" id="game-logo" onerror="this.src='https://evowars.io/assets/images/logo.png'">
        </div>

        <div class="action-box">
            <input type="text" id="name-input" placeholder="Nhập tên sát thủ..." maxlength="15" autocomplete="off">
            <button id="play-btn" disabled>ĐANG KẾT NỐI...</button>
        </div>
        
        <div id="status-text"></div>
    </div>

    <script src="config.js"></script>
    <script type="module" src="src/client/main.js"></script>
</body>
</html>
