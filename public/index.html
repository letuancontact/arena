<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EvoWar Arena</title>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: "Segoe UI", Tahoma, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
      #game { display: block; cursor: url(img/cursor.png), auto; }

      /* GIAO DIỆN MAIN MENU */
      #ui-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.75); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(5px); transition: opacity 0.3s ease; }
      .menu-box { background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%); padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); border: 2px solid #444; text-align: center; width: 320px; }
      .game-title { color: #fff; font-size: 42px; font-weight: 900; margin-top: 0; margin-bottom: 25px; text-shadow: 0 4px 6px rgba(0,0,0,0.5); letter-spacing: 2px; }
      .game-title span { color: #00ff66; }
      #name-input { width: 100%; box-sizing: border-box; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 2px solid #555; background: #000; color: #00ff66; font-size: 18px; font-weight: bold; text-align: center; outline: none; transition: border-color 0.2s; }
      #name-input:focus { border-color: #00ff66; }
      #play-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: linear-gradient(180deg, #00ff66 0%, #00cc55 100%); color: #000; font-size: 20px; font-weight: bold; cursor: pointer; transition: transform 0.1s, filter 0.2s; box-shadow: 0 4px 10px rgba(0,255,102,0.3); }
      #play-btn:active { transform: scale(0.95); }
      #play-btn:hover { filter: brightness(1.2); }
      #play-btn:disabled { background: #555; color: #888; box-shadow: none; cursor: not-allowed; }
      #status-text { color: #ff3333; margin-top: 15px; font-weight: bold; min-height: 20px; font-size: 16px; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- MÀN HÌNH CHỜ (MAIN MENU) -->
    <div id="ui-layer">
      <div class="menu-box">
        <h1 class="game-title">EVO<span>WARS</span></h1>
        <input type="text" id="name-input" placeholder="Nhập tên của bạn..." maxlength="15" autocomplete="off" spellcheck="false" />
        <button id="play-btn" disabled>ĐANG KẾT NỐI...</button>
        <div id="status-text"></div>
      </div>
    </div>

    <script src="/shared/constants.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
